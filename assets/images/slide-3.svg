<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120a1a"/>
      <stop offset="0.55" stop-color="#1a1024"/>
      <stop offset="1" stop-color="#22112d"/>
    </linearGradient>
    <radialGradient id="g1" cx="25%" cy="35%" r="70%">
      <stop offset="0" stop-color="#d63384" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#d63384" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="30%" r="60%">
      <stop offset="0" stop-color="#6f42c1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6f42c1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#g1)"/>
  <rect width="1600" height="600" fill="url(#g2)"/>

  <g>
    <text x="120" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700" fill="#ffffff">
      Smooth Checkout
    </text>
    <text x="120" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.82)">
      Add items to cart and serve customers faster.
    </text>
  </g>

  <g transform="translate(120,330)">
    <rect x="0" y="0" rx="16" ry="16" width="560" height="190" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <text x="28" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.85)">Cart</text>
    <text x="28" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Fast Add-to-Cart</text>
    <text x="28" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.75)">One click to add products and continue shopping.</text>
  </g>
</svg>

