<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06121a"/>
      <stop offset="0.5" stop-color="#0b1b26"/>
      <stop offset="1" stop-color="#0f2233"/>
    </linearGradient>
    <radialGradient id="g1" cx="25%" cy="30%" r="70%">
      <stop offset="0" stop-color="#0dcaf0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="90%" cy="55%" r="65%">
      <stop offset="0" stop-color="#ffc107" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#ffc107" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#g1)"/>
  <rect width="1600" height="600" fill="url(#g2)"/>

  <g>
    <text x="120" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700" fill="#ffffff">
      Stock & Inventory
    </text>
    <text x="120" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.82)">
      Keep quantities accurate and up-to-date.
    </text>
  </g>

  <g transform="translate(120,330)">
    <rect x="0" y="0" rx="16" ry="16" width="640" height="190" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>

    <g transform="translate(28,40)">
      <rect x="0" y="0" rx="10" ry="10" width="180" height="110" fill="rgba(255,255,255,0.08)"/>
      <text x="18" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)">Low stock</text>
      <text x="18" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">12</text>
    </g>

    <g transform="translate(236,40)">
      <rect x="0" y="0" rx="10" ry="10" width="180" height="110" fill="rgba(255,255,255,0.08)"/>
      <text x="18" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)">In stock</text>
      <text x="18" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">248</text>
    </g>

    <g transform="translate(444,40)">
      <rect x="0" y="0" rx="10" ry="10" width="168" height="110" fill="rgba(255,255,255,0.08)"/>
      <text x="18" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)">Updates</text>
      <text x="18" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Daily</text>
    </g>
  </g>
</svg>

